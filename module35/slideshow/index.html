<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="slideWrapper">
        <div class="slide">
            <img src="car.png" style="width:100%;">
        </div>

        <div class="slide">
            <img src="mountain.png" style="width:100%">
        </div>

        <div class="slide">
            <img src="bicycle.png" style="width:100%;">
        </div>

        <div class="slide">
            <img src="sea.png" style="width:100%">
        </div>

        <div class="slide">
            <img src="rock.png" style="width:100%">
        </div>
    </div>

    <a class="prev">
        <img src="backward.png" style="width: 50px; height: 50px;" onclick="plusSlides(-1)">
    </a>

    <a class="prev">
        <img src="forward.png" style="width: 50px; height: 50px;" onclick="plusSlides(1)">
    </a>
    <script src="main.js"></script> 

    
</body>
</html>
